
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

save 900 1

save 300 10

save 60 1000

dbfilename dump.rdb
dir /data

maxmemory 256mb


maxmemory-policy allkeys-lru

tcp-keepalive 300
timeout 0

lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

loglevel notice
logfile ""

notify-keyspace-events ""
