# ─── Persistence ────────────────────────────────
# AOF = Append Only File
# Har write operation file mein log hoti hai
# Server crash ho toh bhi data recover hota hai

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
# everysec = har second sync karo disk pe
# always  = har write pe (safest, slow)
# no      = OS decide kare (fastest, risky)

# RDB snapshot bhi rakho — backup ke liye

# 900 sec mein agar 1 change hua
save 900 1

# 300 sec mein agar 10 changes hue
save 300 10

# 60 sec mein agar 1000 changes hue
save 60 1000

dbfilename dump.rdb
dir /data

# ─── Memory ─────────────────────────────────────
maxmemory 256mb

# allkeys-lru = jab memory full ho
# toh sabse kam use hui key delete karo
maxmemory-policy allkeys-lru

# ─── Performance ────────────────────────────────
tcp-keepalive 300
timeout 0

# Lazy deletion — background mein delete karo
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ─── Logging ────────────────────────────────────
loglevel notice
logfile ""
# "" = stdout — Docker logs mein dikhega

# ─── Pub/Sub ────────────────────────────────────
# Collaboration service ke liye important
notify-keyspace-events ""
# Production mein enable kar sakte ho:
# notify-keyspace-events "Ex" — expire events