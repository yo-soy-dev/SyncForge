# Nginx = professional reverse proxy
# Browser sirf port 80 pe jaata hai
# Nginx andar se sahi service tak bhejta hai

events {
    worker_connections 1024;
    # Ek waqt mein 1024 connections handle kar sakta hai
}

http {

    # ── Upstream servers define karo ──────────────
    # "upstream" = backend servers ka group

    upstream api_gateway {
        server api-gateway:3000;
        # Future mein multiple instances:
        # server api-gateway-1:3000;
        # server api-gateway-2:3000;
    }

    upstream collab_service {
        server collaboration-service:4003;
        # WebSocket ke liye sticky sessions zaroori hain
        ip_hash;
        # ip_hash = same IP → same server
        # WebSocket connection ek hi server pe rehni chahiye
    }

    upstream client_app {
        server client:5173;
    }

    # ── Rate limiting zones ───────────────────────
    # Nginx level pe bhi rate limit — extra protection
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # ── Main server block ─────────────────────────
    server {
        listen 80;
        server_name localhost;  # Production mein: yourdomain.com

        # ── API routes → Gateway ──────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://api_gateway;
            proxy_http_version 1.1;

            # Headers — backend ko pata chale real IP
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Auth routes — stricter limit ─────────
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── WebSocket → Collaboration service ────
        location /socket.io/ {
            proxy_pass http://collab_service;
            proxy_http_version 1.1;

            # WebSocket ke liye ye headers ZAROORI hain
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;

            # WebSocket long-lived connection hoti hai
            proxy_read_timeout 3600s;  # 1 hour
            proxy_send_timeout 3600s;
        }

        # ── React frontend ────────────────────────
        location / {
            proxy_pass http://client_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            # Vite HMR (hot reload) ke liye WebSocket
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Health check ──────────────────────────
        location /nginx-health {
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }
    }
}